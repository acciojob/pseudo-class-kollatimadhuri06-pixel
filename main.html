<!DOCTYPE html>

<html>

<head>
	<style>
		/* your css code here */
		
		#container {
			margin: 20px;
		}

		#container::before,
		#container::after {
			color: #f00;
			font-size: 20px;
		}

		#container::before {
			content: "Before";
		}

		#container::after {
			content: "After";
		}
	</style>
</head>

<body>
	<div id="container"></div>

	<script type="text/javascript" src="./script.js"></script>
</body>

</html>
